<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1200px; height: 900px; overflow: hidden; background: #0e0a06; }

    .wrap {
      width: 1200px;
      height: 900px;
      background: #0e0a06;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Cormorant Garamond', 'Noto Serif KR', serif;
      overflow: hidden;
    }

    /* 배경 질감 */
    .noise {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    /* 금빛 글로우 */
    .glow-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 700px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 65%);
      pointer-events: none;
    }
    .glow-top {
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 테두리 장식 */
    .border-outer {
      position: absolute;
      inset: 28px;
      border: 1px solid rgba(201,168,76,0.18);
      pointer-events: none;
    }
    .border-inner {
      position: absolute;
      inset: 42px;
      border: 1px solid rgba(201,168,76,0.08);
      pointer-events: none;
    }

    /* 모서리 장식 */
    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: #C9A84C;
    }
    .corner::before { width: 100%; height: 1.5px; top: 0; left: 0; }
    .corner::after  { width: 1.5px; height: 100%; top: 0; left: 0; }
    .c-tl { top: 28px; left: 28px; }
    .c-tr { top: 28px; right: 28px; transform: scaleX(-1); }
    .c-bl { bottom: 28px; left: 28px; transform: scaleY(-1); }
    .c-br { bottom: 28px; right: 28px; transform: scale(-1); }

    /* 측면 점 장식 */
    .side-dots {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .side-dots.left { left: 56px; }
    .side-dots.right { right: 56px; }
    .side-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(201,168,76,0.4);
    }

    /* 중앙 콘텐츠 */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* 팔괘 SVG */
    .bagua-wrap {
      margin-bottom: 40px;
      opacity: 0.75;
    }

    /* 상단 태그 */
    .tag-line {
      font-size: 13px;
      letter-spacing: 0.45em;
      color: #C9A84C;
      text-transform: uppercase;
      margin-bottom: 28px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
    }

    /* 한자 장식 */
    .hanja {
      font-size: 22px;
      letter-spacing: 0.6em;
      color: rgba(201,168,76,0.5);
      margin-bottom: 24px;
      font-weight: 300;
    }

    /* 메인 타이틀 */
    .title {
      font-size: 96px;
      font-weight: 300;
      color: #F5F0E8;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 20px;
      font-family: 'Noto Serif KR', 'Cormorant Garamond', serif;
    }

    /* 구분선 */
    .rule {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 28px 0;
    }
    .rule-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5));
    }
    .rule-line.right {
      background: linear-gradient(90deg, rgba(201,168,76,0.5), transparent);
    }
    .rule-diamond {
      width: 6px;
      height: 6px;
      background: #C9A84C;
      transform: rotate(45deg);
    }

    /* 슬로건 */
    .slogan {
      font-size: 26px;
      font-weight: 300;
      color: rgba(245,240,232,0.65);
      letter-spacing: 0.12em;
      line-height: 1.7;
      font-family: 'Noto Serif KR', serif;
    }
    .slogan em {
      color: #C9A84C;
      font-style: normal;
    }

    /* 하단 */
    .bottom {
      position: absolute;
      bottom: 52px;
      left: 80px;
      right: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 20px;
      border-top: 1px solid rgba(201,168,76,0.15);
    }
    .bottom-label {
      font-size: 14px;
      letter-spacing: 0.3em;
      color: rgba(201,168,76,0.45);
      text-transform: uppercase;
    }
    .bottom-chips {
      display: flex;
      gap: 10px;
    }
    .chip {
      padding: 6px 16px;
      border: 1px solid rgba(201,168,76,0.2);
      font-size: 13px;
      color: rgba(201,168,76,0.6);
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="noise"></div>
    <div class="glow-center"></div>
    <div class="glow-top"></div>

    <!-- 테두리 -->
    <div class="border-outer"></div>
    <div class="border-inner"></div>

    <!-- 모서리 -->
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>

    <!-- 측면 점 -->
    <div class="side-dots left">
      <div class="side-dot"></div>
      <div class="side-dot"></div>
      <div class="side-dot"></div>
      <div class="side-dot"></div>
      <div class="side-dot"></div>
    </div>
    <div class="side-dots right">
      <div class="side-dot"></div>
      <div class="side-dot"></div>
      <div class="side-dot"></div>
      <div class="side-dot"></div>
      <div class="side-dot"></div>
    </div>

    <!-- 중앙 콘텐츠 -->
    <div class="content">

      <!-- 팔괘 SVG -->
      <div class="bagua-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="36" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
          <circle cx="40" cy="40" r="22" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
          <circle cx="40" cy="40" r="9" fill="rgba(201,168,76,0.15)" stroke="#C9A84C" stroke-width="0.8"/>
          <!-- 8방향 선 -->
          <g stroke="#C9A84C" stroke-width="1.5" opacity="0.7">
            <line x1="40" y1="4"  x2="40" y2="18"/>
            <line x1="40" y1="62" x2="40" y2="76"/>
            <line x1="4"  y1="40" x2="18" y2="40"/>
            <line x1="62" y1="40" x2="76" y2="40"/>
            <line x1="14.7" y1="14.7" x2="24.9" y2="24.9"/>
            <line x1="55.1" y1="55.1" x2="65.3" y2="65.3"/>
            <line x1="65.3" y1="14.7" x2="55.1" y2="24.9"/>
            <line x1="24.9" y1="55.1" x2="14.7" y2="65.3"/>
          </g>
          <!-- 팔괘 효 (간략) -->
          <g stroke="#C9A84C" stroke-width="2" stroke-linecap="round" opacity="0.85">
            <line x1="34" y1="4.5" x2="46" y2="4.5"/>
            <line x1="34" y1="8"   x2="39" y2="8"/>
            <line x1="41" y1="8"   x2="46" y2="8"/>
          </g>
          <circle cx="40" cy="40" r="3" fill="#C9A84C"/>
        </svg>
      </div>

      <div class="tag-line">AI 사주명리 · Daily Fortune</div>
      <div class="hanja">四 柱 八 字</div>

      <div class="title">내팔자야</div>

      <div class="rule">
        <div class="rule-line"></div>
        <div class="rule-diamond"></div>
        <div class="rule-line right"></div>
      </div>

      <div class="slogan">
        매일 아침, <em>내 운명</em>을 먼저 읽어
      </div>

    </div>

    <!-- 하단 바 -->
    <div class="bottom">
      <span class="bottom-label">naepalja.vercel.app</span>
      <div class="bottom-chips">
        <span class="chip">오늘의 운세</span>
        <span class="chip">부적</span>
        <span class="chip">AI 상담</span>
      </div>
    </div>
  </div>
</body>
</html>
