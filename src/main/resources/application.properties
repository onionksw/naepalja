# =============================================
# 내팔자야 애플리케이션 설정
# =============================================

# 서버 포트
server.port=8080

# =============================================
# MySQL 데이터베이스 설정
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/naepalja?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# MyBatis 설정
# =============================================
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.naepalja.vo
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# =============================================
# Thymeleaf 설정
# =============================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# =============================================
# Claude API 설정 (절대 키를 직접 입력하지 말 것)
# =============================================
claude.api.key=YOUR_CLAUDE_API_KEY
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-5
claude.api.max-tokens=1500

# =============================================
# 로깅 설정
# =============================================
logging.level.com.naepalja=DEBUG
logging.level.org.mybatis=DEBUG
